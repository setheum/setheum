[package]
name = "contract-transcode"
version = "5.0.3"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
license = "Apache-2.0 OR MIT"
readme = "README.md"
repository = "https://github.com/use-ink/cargo-contract"
documentation = "https://docs.rs/contract-transcode"
homepage = "https://www.substrate.io/"
description = "Library encoding calls for smart contracts on substrate"
keywords = [ "wasm", "ink", "webassembly", "blockchain", "edsl",]
include = [ "Cargo.toml", "*.rs", "LICENSE",]

[lib]
path = "src/lib.rs"

[dependencies]
escape8259 = "0.5.2"
indexmap = "2.2.6"
nom = "7.1.3"
strsim = "0.11.1"

[dev-dependencies]
assert_matches = "1.5.0"

[features]
default = [ "std",]
std = []

[dependencies.anyhow]
workspace = true

[dependencies.base58]
version = "0.2.0"

[dependencies.blake2]
workspace = true
default-features = false

[dependencies.contract-metadata]
workspace = true

[dependencies.hex]
workspace = true

[dependencies.ink_env]
workspace = true

[dependencies.ink_metadata]
workspace = true

[dependencies.itertools]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.nom-supreme]
version = "0.7.0"
features = [ "error",]

[dependencies.primitive-types]
version = "0.13.1"
default-features = false
features = [ "codec", "scale-info", "serde",]

[dependencies.scale]
workspace = true
features = [ "derive",]

[dependencies.scale-info]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.serde]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.serde_json]
workspace = true

[dependencies.thiserror]
workspace = true

[dev-dependencies.ink]
workspace = true

[dev-dependencies.sp-core]
workspace = true

[dev-dependencies.sp-keyring]
workspace = true
