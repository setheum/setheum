[package]
name = "ink_storage"
authors = [ "Use Ink <ink@use.ink>",]
license = "Apache-2.0 OR MIT"
readme = "README.md"
documentation = "https://docs.rs/ink_storage/"
description = "[ink!] Data structures to organize and manipulate ink! contract storage."
include = [ "Cargo.toml", "src/**/*.rs", "README.md", "LICENSE",]

[features]
default = [ "std",]
std = [ "ink_env/std", "ink_metadata/std", "ink_prelude/std", "ink_primitives/std", "ink_storage_traits/std", "scale-info/std", "scale/std", "derive_more/std",]
ink-fuzz-tests = [ "std",]

[package.version]
workspace = true

[package.edition]
workspace = true

[package.repository]
workspace = true

[package.homepage]
workspace = true

[package.keywords]
workspace = true

[package.categories]
workspace = true

[dependencies.ink_env]
workspace = true

[dependencies.ink_metadata]
workspace = true
optional = true

[dependencies.ink_primitives]
workspace = true

[dependencies.ink_storage_traits]
workspace = true

[dependencies.ink_prelude]
workspace = true

[dependencies.pallet-contracts-uapi]
workspace = true

[dependencies.scale]
workspace = true

[dependencies.derive_more]
workspace = true
features = [ "from", "display",]

[dependencies.scale-info]
workspace = true
features = [ "derive",]
optional = true

[dependencies.cfg-if]
workspace = true

[dependencies.array-init]
workspace = true

[dev-dependencies.quickcheck]
workspace = true

[dev-dependencies.quickcheck_macros]
workspace = true

[dev-dependencies.itertools]
workspace = true
default-features = true

[dev-dependencies.ink]
workspace = true
