[package]
name = "ink_env"
authors = [ "Use Ink <ink@use.ink>",]
rust-version = "1.68"
license = "Apache-2.0 OR MIT"
readme = "README.md"
documentation = "https://docs.rs/ink_env/"
description = "[ink!] Low-level interface for interacting with the smart contract Wasm executor."
include = [ "Cargo.toml", "src/**/*.rs", "README.md", "LICENSE",]

[features]
default = [ "std",]
std = [ "blake2", "ink_allocator/std", "ink_prelude/std", "ink_primitives/std", "ink_storage_traits/std", "ink_engine/std", "scale/std", "scale-decode", "scale-encode", "scale-info/std", "secp256k1", "schnorrkel", "num-traits/std", "sha2", "sha3", "scale-decode?/std", "scale-encode?/std", "xcm/std", "derive_more/std",]
ink-debug = []
no-allocator = [ "ink_allocator/no-allocator",]
no-panic-handler = []

[package.version]
workspace = true

[package.edition]
workspace = true

[package.repository]
workspace = true

[package.homepage]
workspace = true

[package.keywords]
workspace = true

[package.categories]
workspace = true

[dependencies.ink_allocator]
workspace = true

[dependencies.ink_storage_traits]
workspace = true

[dependencies.ink_prelude]
workspace = true

[dependencies.ink_primitives]
workspace = true

[dependencies.pallet-contracts-uapi]
workspace = true

[dependencies.scale]
workspace = true
features = [ "max-encoded-len",]

[dependencies.derive_more]
workspace = true
features = [ "from", "display",]

[dependencies.num-traits]
workspace = true
features = [ "i128",]

[dependencies.cfg-if]
workspace = true

[dependencies.paste]
workspace = true

[dependencies.static_assertions]
workspace = true

[dependencies.const_env]
workspace = true

[dependencies.xcm]
workspace = true

[dev-dependencies.ink]
workspace = true

[target."cfg(target_arch = \"wasm32\")".dependencies.rlibc]
workspace = true

[target."cfg(not(target_arch = \"wasm32\"))".dependencies.ink_engine]
workspace = true
default-features = true
optional = true

[target."cfg(not(target_arch = \"wasm32\"))".dependencies.sha2]
workspace = true
optional = true

[target."cfg(not(target_arch = \"wasm32\"))".dependencies.sha3]
workspace = true
optional = true

[target."cfg(not(target_arch = \"wasm32\"))".dependencies.blake2]
workspace = true
optional = true

[target."cfg(not(target_arch = \"wasm32\"))".dependencies.secp256k1]
workspace = true
features = [ "recovery", "global-context",]
optional = true

[target."cfg(not(target_arch = \"wasm32\"))".dependencies.schnorrkel]
version = "0.11.4"
optional = true

[target."cfg(not(target_arch = \"wasm32\"))".dependencies.scale-decode]
workspace = true
optional = true

[target."cfg(not(target_arch = \"wasm32\"))".dependencies.scale-encode]
workspace = true
optional = true

[target."cfg(not(target_arch = \"wasm32\"))".dependencies.scale-info]
workspace = true
features = [ "derive",]
optional = true
