[package]
name = "ink_e2e_macro"
license = "Apache-2.0 OR MIT"
readme = "../README.md"
documentation = "https://docs.rs/ink_macro/"
description = "[ink!] Macro for generating end-to-end tests"
include = [ "Cargo.toml", "src/**/*.rs", "README.md", "LICENSE",]

[lib]
name = "ink_e2e_macro"
proc-macro = true

[dev-dependencies]
temp-env = "0.3.6"

[features]
std = [ "derive_more/std",]
sandbox = []

[package.version]
workspace = true

[package.authors]
workspace = true

[package.edition]
workspace = true

[package.repository]
workspace = true

[package.homepage]
workspace = true

[package.keywords]
workspace = true

[package.categories]
workspace = true

[dependencies.darling]
workspace = true

[dependencies.ink_ir]
workspace = true
default-features = true

[dependencies.derive_more]
workspace = true
features = [ "from",]

[dependencies.tracing-subscriber]
workspace = true
features = [ "env-filter",]

[dependencies.serde_json]
workspace = true

[dependencies.syn]
workspace = true

[dependencies.proc-macro2]
workspace = true

[dependencies.quote]
workspace = true

[dev-dependencies.ink]
workspace = true

[dev-dependencies.ink_e2e]
workspace = true
features = [ "sandbox",]
