[package]
name = "ink_metadata"
authors = [ "Use Ink <ink@use.ink>",]
license = "Apache-2.0 OR MIT"
readme = "README.md"
documentation = "https://docs.rs/ink_metadata/"
description = "[ink!] Metadata definitions for ink! smart contracts."
include = [ "Cargo.toml", "src/**/*.rs", "README.md", "LICENSE",]

[features]
default = [ "derive", "std",]
std = [ "ink_prelude/std", "ink_primitives/std", "scale-info/std", "serde/std", "scale/std", "derive_more/std",]
derive = []

[package.version]
workspace = true

[package.edition]
workspace = true

[package.repository]
workspace = true

[package.homepage]
workspace = true

[package.keywords]
workspace = true

[package.categories]
workspace = true

[dependencies.ink_prelude]
workspace = true

[dependencies.ink_primitives]
workspace = true

[dependencies.serde]
workspace = true
features = [ "derive", "alloc",]

[dependencies.impl-serde]
workspace = true
default-features = true

[dependencies.derive_more]
workspace = true
features = [ "from",]

[dependencies.linkme]
workspace = true

[dependencies.scale]
workspace = true

[dependencies.scale-info]
workspace = true
features = [ "derive", "serde", "decode", "schema",]

[dependencies.schemars]
workspace = true

[dev-dependencies.pretty_assertions]
workspace = true

[dev-dependencies.serde_json]
workspace = true
