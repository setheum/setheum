[package]
name = "cargo-contract"
version = "5.0.3"
authors = [ "Use Ink <ink@use.ink>",]
build = "build.rs"
edition = "2021"
license = "Apache-2.0 OR MIT"
readme = "README.md"
repository = "https://github.com/use-ink/cargo-contract"
documentation = "https://docs.substrate.io/tutorials/v3/ink-workshop/pt1/"
homepage = "https://use.ink"
description = "Setup and deployment tool for developing Wasm based smart contracts via ink!"
keywords = [ "wasm", "ink", "webassembly", "blockchain", "edsl",]
categories = [ "command-line-utilities", "development-tools::build-utils", "development-tools::cargo-plugins",]
include = [ "Cargo.toml", "src/**/*.rs", "README.md", "LICENSE", "build.rs",]

[dependencies]
colored = "2.1.0"
regex = "1"
semver = "1.0"
jsonschema = "0.26"
comfy-table = "7.1.1"

[build-dependencies]
current_platform = "0.2.0"

[dev-dependencies]
assert_cmd = "2.0.14"
regex = "1.10.4"
predicates = "3.1.0"
tempfile = "3.10.1"

[features]
default = [ "std",]
std = []
test-ci-only = []
integration-tests = []

[dependencies.contract-build]
workspace = true

[dependencies.contract-extrinsics]
workspace = true

[dependencies.contract-transcode]
workspace = true

[dependencies.contract-metadata]
workspace = true

[dependencies.contract-analyze]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive", "env",]

[dependencies.primitive-types]
version = "0.13.1"
default-features = false
features = [ "codec", "scale-info", "serde",]

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true
features = [ "env-filter",]

[dependencies.which]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.serde]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.url]
version = "2.5.4"
features = [ "serde",]

[dependencies.schemars]
workspace = true

[dependencies.ink_metadata]
workspace = true

[dependencies.ink_env]
workspace = true

[dependencies.tokio]
workspace = true
features = [ "macros", "rt-multi-thread",]

[dependencies.subxt]
workspace = true
features = [ "substrate-compat",]

[dependencies.sp-core]
workspace = true

[dependencies.sp-weights]
workspace = true

[dependencies.hex]
workspace = true

[build-dependencies.anyhow]
workspace = true

[build-dependencies.substrate-build-script-utils]
workspace = true

[build-dependencies.which]
workspace = true
