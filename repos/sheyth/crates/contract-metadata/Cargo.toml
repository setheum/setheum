[package]
name = "contract-metadata"
version = "5.0.3"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
license = "Apache-2.0 OR MIT"
readme = "README.md"
repository = "https://github.com/use-ink/cargo-contract"
documentation = "https://docs.rs/contract-metadata"
homepage = "https://www.substrate.io/"
description = "Library defining metadata for smart contracts on substrate"
keywords = [ "wasm", "ink", "webassembly", "blockchain", "edsl",]
include = [ "Cargo.toml", "*.rs", "LICENSE", "compatibility_list.json",]

[dependencies.impl-serde]
workspace = true

[dependencies.semver]
version = "1.0.23"
features = [ "serde",]

[dependencies.serde]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.serde_json]
workspace = true

[dependencies.url]
version = "2.5.4"
features = [ "serde",]

[dependencies.anyhow]
workspace = true

[dev-dependencies.pretty_assertions]
workspace = true
