[package]
name = "contract-build"
version = "5.0.3"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
license = "Apache-2.0 OR MIT"
readme = "README.md"
repository = "https://github.com/use-ink/cargo-contract"
documentation = "https://docs.rs/contract-build"
homepage = "https://www.substrate.io/"
description = "Library for building ink! smart contracts"
keywords = [ "wasm", "ink", "webassembly", "blockchain", "edsl",]
include = [ "Cargo.toml", "src/**/*.rs", "README.md", "LICENSE", "build.rs", "templates", "riscv_memory_layout.ld",]

[dependencies]
regex = "1"
colored = "2.1.0"
duct = "0.13.7"
rustc_version = "0.4.0"
toml = "0.8.13"
wasmparser = "0.220.0"
tempfile = "3.10.1"
term_size = "0.3.2"
tokio-stream = "0.1"
bollard = "0.18"

[build-dependencies]
walkdir = "2.5.0"

[dev-dependencies]
wabt = "0.10.0"

[dependencies.anyhow]
workspace = true

[dependencies.blake2]
workspace = true

[dependencies.cargo_metadata]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive", "env",]

[dependencies.heck]
workspace = true

[dependencies.hex]
workspace = true

[dependencies.impl-serde]
workspace = true

[dependencies.scale]
workspace = true
features = [ "derive",]

[dependencies.tracing]
workspace = true

[dependencies.wasm-encoder]
version = "0.220.0"
features = [ "wasmparser",]

[dependencies.semver]
version = "1.0.23"
features = [ "serde",]

[dependencies.serde]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.serde_json]
workspace = true

[dependencies.url]
version = "2.5.4"
features = [ "serde",]

[dependencies.wasm-opt]
version = "=0.116.1"
default-features = false

[dependencies.which]
workspace = true

[dependencies.zip]
version = "2.2.1"
default-features = false

[dependencies.strum]
version = "0.26"
features = [ "derive",]

[dependencies.tokio]
workspace = true
features = [ "macros", "rt-multi-thread",]

[dependencies.crossterm]
workspace = true

[dependencies.contract-metadata]
workspace = true

[build-dependencies.anyhow]
workspace = true

[build-dependencies.zip]
version = "2.2.1"
default-features = false

[dev-dependencies.pretty_assertions]
workspace = true

[target."cfg(unix)".dependencies]
uzers = "0.12"
