[package]
name = "contract-extrinsics"
version = "5.0.3"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
rust-version = "1.70"
license = "Apache-2.0 OR MIT"
readme = "README.md"
repository = "https://github.com/use-ink/cargo-contract"
documentation = "https://docs.rs/contract-extrinsics"
homepage = "https://www.substrate.io/"
description = "Library defining extrinsics for smart contracts on substrate"
keywords = [ "wasm", "ink", "webassembly", "blockchain", "edsl",]
include = [ "Cargo.toml", "*.rs", "LICENSE",]

[dependencies]
colored = "2.1.0"
rust_decimal = "1.36"
derivative = "2.2.0"

[dev-dependencies]
assert_cmd = "2.0.14"
regex = "1.10.4"
predicates = "3.1.0"
tempfile = "3.10.1"

[features]
integration-tests = []
test-ci-only = []

[dependencies.contract-build]
workspace = true

[dependencies.contract-metadata]
workspace = true

[dependencies.contract-transcode]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.blake2]
workspace = true
default-features = false

[dependencies.futures]
workspace = true
features = [ "std",]
default-features = false

[dependencies.itertools]
workspace = true
default-features = false

[dependencies.tracing]
workspace = true

[dependencies.scale]
workspace = true
features = [ "derive",]

[dependencies.serde]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.serde_json]
workspace = true

[dependencies.url]
version = "2.5.4"
features = [ "serde",]

[dependencies.tokio]
workspace = true
features = [ "macros", "rt-multi-thread",]

[dependencies.sp-core]
workspace = true

[dependencies.sp-runtime]
workspace = true

[dependencies.sp-weights]
workspace = true

[dependencies.pallet-contracts-uapi]
workspace = true
features = [ "scale",]

[dependencies.scale-info]
workspace = true

[dependencies.subxt]
workspace = true

[dependencies.hex]
workspace = true

[dependencies.ink_metadata]
workspace = true

[dependencies.ink_env]
workspace = true

[dev-dependencies.ink]
workspace = true

[dev-dependencies.tracing-subscriber]
workspace = true
features = [ "env-filter",]

[dev-dependencies.subxt-signer]
workspace = true
features = [ "subxt", "sr25519",]
