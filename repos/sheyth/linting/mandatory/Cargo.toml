[[example]]
name = "no_main_pass"
path = "ui/pass/no_main.rs"

[package]
name = "ink_linting_mandatory"
license = "Apache-2.0 OR MIT"
readme = "README.md"
documentation = "https://docs.rs/ink_linting_mandatory"
description = "Mandatory ink! linting rules"
include = [ "Cargo.toml", "*.rs", "LICENSE",]

[lib]
crate-type = [ "cdylib",]

[dependencies]
dylint_linting = "3.2.0"
if_chain = "1.0.2"
regex = "1.5.4"

[dev-dependencies]
dylint_testing = "3.2.0"

[features]
default = [ "std",]
std = [ "ink_metadata/std", "ink_env/std", "ink_storage/std", "ink_primitives/std", "scale/std", "scale-info/std",]
ink-as-dependency = []

[package.version]
workspace = true

[package.authors]
workspace = true

[package.edition]
workspace = true

[package.repository]
workspace = true

[package.homepage]
workspace = true

[package.keywords]
workspace = true

[dependencies.log]
workspace = true

[dependencies.ink_linting_utils]
workspace = true

[dev-dependencies.ink]
workspace = true
features = [ "std",]
default-features = false

[dev-dependencies.ink_env]
workspace = true
default-features = false

[dev-dependencies.ink_metadata]
workspace = true
default-features = false

[dev-dependencies.ink_primitives]
workspace = true
default-features = false

[dev-dependencies.ink_storage]
workspace = true
default-features = false

[dev-dependencies.scale]
workspace = true
features = [ "derive",]
default-features = false

[dev-dependencies.scale-info]
workspace = true
features = [ "derive",]
default-features = false

[package.metadata.rust-analyzer]
rustc_private = true
