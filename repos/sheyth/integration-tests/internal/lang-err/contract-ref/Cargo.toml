[package]
license = "Apache-2.0 OR MIT"
name = "contract_ref"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "integration_flipper/std",]
ink-as-dependency = []
e2e-tests = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.integration_flipper]
path = "../integration-flipper"
default-features = false
features = [ "ink-as-dependency",]

[dev-dependencies.ink_e2e]
workspace = true
