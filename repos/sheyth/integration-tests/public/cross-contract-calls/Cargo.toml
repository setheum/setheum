[package]
license = "Apache-2.0 OR MIT"
name = "cross-contract-calls"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "other-contract/std",]
ink-as-dependency = []
e2e-tests = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.other-contract]
path = "other-contract"
default-features = false
features = [ "ink-as-dependency",]

[dev-dependencies.ink_e2e]
workspace = true
