[package]
license = "Apache-2.0 OR MIT"
name = "trait-incrementer-caller"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "dyn-traits/std",]
e2e-tests = []
ink-as-dependency = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.dyn-traits]
path = "./traits"
default-features = false

[dev-dependencies.ink_e2e]
workspace = true

[dev-dependencies.trait-incrementer]
path = "./contracts/incrementer"
default-features = false
features = [ "ink-as-dependency",]
