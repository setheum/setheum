[package]
license = "Apache-2.0 OR MIT"
name = "custom-allocator"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std",]
ink-as-dependency = []
e2e-tests = []

[dependencies.ink]
workspace = true
features = [ "no-allocator",]
default-features = false

[dependencies.dlmalloc]
version = "0.2"
default-features = false
features = [ "global",]

[dev-dependencies.ink_e2e]
workspace = true
