[package]
license = "Apache-2.0 OR MIT"
name = "call-runtime"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "sp-runtime/std", "sp-io/std",]
ink-as-dependency = []
e2e-tests = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.sp-io]
workspace = true
features = [ "disable_panic_handler", "disable_oom", "disable_allocator",]
default-features = false

[dependencies.sp-runtime]
workspace = true
default-features = false

[dev-dependencies.ink_e2e]
workspace = true
