[package]
license = "Apache-2.0 OR MIT"
name = "events"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "event-def/std", "event-def2/std", "event-def-unused/std",]
ink-as-dependency = []
e2e-tests = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.event-def]
path = "event-def"
default-features = false

[dependencies.event-def2]
path = "event-def2"
default-features = false

[dependencies.event-def-unused]
path = "event-def-unused"
default-features = false

[dev-dependencies.ink_e2e]
workspace = true

[profile.test]
lto = "thin"
