[package]
name = "runtime-call-contract"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[dev-dependencies]
scale-value = "0.14.1"

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "sandbox-runtime/std", "flipper-traits/std",]
ink-as-dependency = []

[workspace.package]
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
homepage = "https://use.ink"
keywords = [ "wasm", "ink", "webassembly", "blockchain", "edsl",]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/use-ink/ink"

[dependencies.ink]
workspace = true
default-features = false

[dependencies.flipper-traits]
path = "traits"
default-features = false

[dev-dependencies.ink_e2e]
workspace = true
features = [ "sandbox",]

[dev-dependencies.sandbox-runtime]
path = "sandbox-runtime"
default-features = false

[dev-dependencies.frame-support]
workspace = true
default-features = false

[workspace.dependencies.frame-support]
version = "32.0.0"
default-features = false

[workspace.dependencies.frame-system]
version = "32.0.0"
default-features = false

[workspace.dependencies.pallet-contracts]
version = "31.0.0"
default-features = false

[workspace.dependencies.sp-runtime]
version = "35.0.0"
default-features = false

[workspace.dependencies.codec]
package = "parity-scale-codec"
version = "3.6.9"
default-features = false

[workspace.dependencies.scale-info]
version = "2.11.1"
default-features = false
