[package]
name = "pallet-contract-caller"
version = "0.1.0"
description = "Demonstrate calling an ink! contract from a pallet"
authors = [ "Use Ink <ink@use.ink>",]
homepage = "https://substrate.io"
license = "Apache-2.0 OR MIT"
publish = false
repository = "https://github.com/use-ink/ink"

[features]
default = [ "std",]
std = [ "codec/std", "frame-support/std", "frame-system/std", "sp-runtime/std", "scale-info/std", "pallet-contracts/std", "ink/std",]
try-runtime = []

[package.edition]
workspace = true

[dependencies.codec]
workspace = true
default-features = false
features = [ "derive",]

[dependencies.scale-info]
workspace = true
default-features = false
features = [ "derive",]

[dependencies.frame-support]
workspace = true
default-features = false

[dependencies.frame-system]
workspace = true
default-features = false

[dependencies.sp-runtime]
workspace = true
default-features = false

[dependencies.pallet-contracts]
workspace = true
default-features = false

[dependencies.flipper-traits]
path = "../../traits"
default-features = false

[dependencies.ink]
workspace = true
features = [ "no-panic-handler", "no-allocator",]

[package.metadata.docs.rs]
targets = [ "x86_64-unknown-linux-gnu",]
