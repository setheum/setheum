[package]
license = "Apache-2.0 OR MIT"
name = "multi-contract-caller"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "adder/std", "subber/std", "accumulator/std",]
ink-as-dependency = []
e2e-tests = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.adder]
path = "adder"
default-features = false
features = [ "ink-as-dependency",]

[dependencies.subber]
path = "subber"
default-features = false
features = [ "ink-as-dependency",]

[dependencies.accumulator]
path = "accumulator"
default-features = false
features = [ "ink-as-dependency",]

[dev-dependencies.ink_e2e]
workspace = true
