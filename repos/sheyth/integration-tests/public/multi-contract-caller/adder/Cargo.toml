[package]
license = "Apache-2.0 OR MIT"
name = "adder"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "accumulator/std",]
ink-as-dependency = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.accumulator]
path = "../accumulator"
default-features = false
features = [ "ink-as-dependency",]
