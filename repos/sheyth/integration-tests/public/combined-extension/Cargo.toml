[package]
license = "Apache-2.0 OR MIT"
name = "combined_extension"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "psp22_extension/std", "rand_extension/std",]
ink-as-dependency = [ "psp22_extension/ink-as-dependency", "rand_extension/ink-as-dependency",]

[dependencies.ink]
workspace = true
default-features = false

[dependencies.psp22_extension]
path = "../psp22-extension"
default-features = false
features = [ "ink-as-dependency",]

[dependencies.rand_extension]
path = "../rand-extension"
default-features = false
features = [ "ink-as-dependency",]
