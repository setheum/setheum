[package]
license = "Apache-2.0 OR MIT"
name = "delegator"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std",]
ink-as-dependency = []
e2e-tests = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.delegatee]
path = "delegatee"
default-features = false
features = [ "ink-as-dependency",]

[dependencies.delegatee2]
path = "delegatee2"
default-features = false
features = [ "ink-as-dependency",]

[dev-dependencies.ink_e2e]
workspace = true
