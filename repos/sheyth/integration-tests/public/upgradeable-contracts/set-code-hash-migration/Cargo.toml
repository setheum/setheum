[package]
license = "Apache-2.0 OR MIT"
name = "incrementer"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "migration/std", "updated-incrementer/std",]
ink-as-dependency = []
e2e-tests = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.migration]
path = "./migration"
default-features = false
features = [ "ink-as-dependency",]

[dependencies.updated-incrementer]
path = "./updated-incrementer"
default-features = false
features = [ "ink-as-dependency",]

[dev-dependencies.ink_e2e]
workspace = true
