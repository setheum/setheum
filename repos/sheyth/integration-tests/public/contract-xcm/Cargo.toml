[package]
license = "Apache-2.0 OR MIT"
name = "contract-xcm"
version = "5.1.1"
authors = [ "Use Ink <ink@use.ink>",]
edition = "2021"
publish = false

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "pallet-balances/std", "frame-support/std",]
ink-as-dependency = []
e2e-tests = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.frame-support]
workspace = true
default-features = false

[dependencies.pallet-balances]
workspace = true
default-features = false

[dev-dependencies.ink_e2e]
workspace = true
features = [ "sandbox",]
