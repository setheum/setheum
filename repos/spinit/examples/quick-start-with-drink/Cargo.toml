[package]
license = "Apache-2.0 OR MIT"
name = "quick-start-with-drink"
authors = [ "Cardinal",]
edition = "2021"
homepage = "https://setheum.com"
repository = "https://github.com/use-ink/drink"
version = "0.1.0"

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std",]
ink-as-dependency = []

[dependencies.ink]
workspace = true
features = [ "ink-debug",]
default-features = false

[dev-dependencies.drink]
workspace = true
