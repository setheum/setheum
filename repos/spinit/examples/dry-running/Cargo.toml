[package]
license = "Apache-2.0 OR MIT"
name = "dry-running"
authors = ["Afsall Labs", "Setheum Foundation">"]
edition = "2021"
homepage = "https://setheum.com"
repository = "https://github.com/use-ink/drink"
version = "0.1.0"

[dependencies]
ink = { version = "6.0.0-alpha", default-features = false }

[dev-dependencies]
drink = { path = "../../drink" }

[lib]
path = "lib.rs"

[features]
default = ["std"]
std = ["ink/std"]
ink-as-dependency = []
