[package]
license = "Apache-2.0 OR MIT"
name = "cross-contract-call-tracing"
authors = [ "Cardinal",]
edition = "2021"
homepage = "https://setheum.com"
repository = "https://github.com/use-ink/drink"
version = "0.1.0"

[lib]
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "scale/std", "scale-info/std",]
ink-as-dependency = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.scale]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.scale-info]
workspace = true
features = [ "derive",]
default-features = false
optional = true

[dev-dependencies.drink]
workspace = true
