[package]
name = "finality-rate-limiter"
version = "0.1.0"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true


[dependencies]
futures = { workspace = true , default-features = false }
log = { workspace = true , default-features = false }
tokio = { workspace = true, features = ["time", "sync", "macros", "rt-multi-thread"] , default-features = false }

[dev-dependencies]
parking_lot = { workspace = true , default-features = false }
rand = { workspace = true, features = ["std", "std_rng"] , default-features = false }
