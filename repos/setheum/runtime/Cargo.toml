[package]
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
authors = [ "Afsall Labs", "Afsall Labs", "Setheum Foundation",]
version = "1.0.0"
edition = "2018"
build = "build.rs"
homepage = "https://setheum.com"
name = "setheum-runtime"
repository = "https://github.com/setheum/setheum"

[features]
default = [ "std",]
std = [ "codec/std", "serde", "frame-executive/std", "frame-support/std", "frame-system/std", "frame-system-rpc-runtime-api/std", "frame-benchmarking/std", "frame-election-provider-support/std", "pallet-balances/std", "pallet-bounties/std", "pallet-collective/std", "pallet-democracy/std", "pallet-indices/std", "pallet-membership/std", "pallet-multisig/std", "pallet-proxy/std", "pallet-recovery/std", "pallet-insecure-randomness-collective-flip/std", "pallet-sudo/std", "pallet-scheduler/std", "pallet-timestamp/std", "pallet-tips/std", "pallet-transaction-payment/std", "pallet-transaction-payment-rpc-runtime-api/std", "pallet-treasury/std", "pallet-utility/std", "pallet-session/std", "pallet-staking/std", "pallet-authorship/std", "pallet-aura/std", "sp-consensus-aura/std", "sp-authority-discovery/std", "pallet-authority-discovery/std", "pallet-im-online/std", "pallet-offences/std", "pallet-identity/std", "sp-api/std", "sp-block-builder/std", "sp-core/std", "sp-offchain/std", "sp-runtime/std", "sp-session/std", "sp-staking/std", "sp-std/std", "sp-transaction-pool/std", "sp-version/std", "module-traits/std", "module-tokens/std", "module-authority/std", "module-benchmarking/std", "module-oracle-rpc-runtime-api/std", "module-dex-oracle/std", "module-oracle/std", "module-airdrop/std", "module-currencies/std", "module-unified-accounts/std", "module-nft/std", "module-prices/std", "module-support/std", "module-transaction-pause/std", "module-vesting/std", "module-swap_legacy/std", "module-move/std", "primitives/std", "runtime-common/std", "pallet-evm/std", "pallet-ethereum/std", "fp-evm/std",]
with-ethereum-compatibility = [ "runtime-common/with-ethereum-compatibility",]
runtime-benchmarks = [ "hex-literal", "libsecp256k1/hmac", "frame-benchmarking", "frame-support/runtime-benchmarks", "frame-system-benchmarking", "frame-system/runtime-benchmarks", "pallet-balances/runtime-benchmarks", "pallet-collective/runtime-benchmarks", "pallet-timestamp/runtime-benchmarks", "sp-runtime/runtime-benchmarks", "module-unified-accounts/runtime-benchmarks", "module-nft/runtime-benchmarks", "module-vesting/runtime-benchmarks", "module-benchmarking", "module-authority/runtime-benchmarks", "module-tokens/runtime-benchmarks",]

