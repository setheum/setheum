[package]
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
name = "runtime-common"
version = "0.9.81-dev"
authors = ["Afsall Labs"]
edition = "2021"

[dependencies]
static_assertions = "1.1.0"
num_enum = { workspace = true }
serde = { workspace = true, optional = true }
codec = { package = "parity-scale-codec", version = "2.0.0", default-features = false }
ethabi = { workspace = true }
sp-std = { workspace = true }
sp-core = { workspace = true }
sp-runtime = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
pallet-scheduler = { workspace = true }
log = { workspace = true }
pallet-collective = { workspace = true }
pallet-membership = { workspace = true }

module-oracle = { workspace = true }
module-traits = { workspace = true }

module-evm = { workspace = true }

module-support = { workspace = true }
module-transaction-payment = { workspace = true }
primitives = { workspace = true }
primitives-proc-macro = { path = "../../primitives/proc-macro" }

[dev-dependencies]
serde_json = "1.0.41"
hex-literal = "0.3.1"
sp-io = { workspace = true }
pallet-timestamp = { workspace = true }
pallet-balances = { workspace = true }
pallet-proxy = { workspace = true }
pallet-utility = { workspace = true }

module-tokens = { workspace = true }
# module-nft = { path = "../../runtime-modules/module-nft" }

module-currencies = { workspace = true }
module-evm-bridge = { workspace = true }
module-evm-manager = { workspace = true }
module-nft = { path = "../../runtime-modules/nft" }
# module-dex = { path = "../../runtime-modules/defi/setswap/dex" }
module-prices = { path = "../../runtime-modules/prices" }
module-transaction-payment = { workspace = true }

[features]
default = ["std"]
std = [
	"num_enum/std",
	"serde",
	"codec/std",
	"ethabi/std",
	"frame-support/std",
	"frame-system/std",
	"pallet-scheduler/std",
	"pallet-collective/std",
	"pallet-membership/std",
	"sp-core/std",
	"sp-runtime/std",
	"sp-std/std",
	"module-oracle/std",
	"module-traits/std",
	"module-evm/std",
	"module-support/std",
	"primitives/std",
]
with-ethereum-compatibility = [
	"module-evm/with-ethereum-compatibility",
]
