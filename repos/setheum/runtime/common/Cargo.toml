[package]
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
name = "runtime-common"
version = "0.9.81-dev"
authors = [ "Afsall Labs",]
edition = "2021"

[features]
default = ["std"]
std = [
	"codec/std",
	"ethabi/std",
	"fp-evm/std",
	"frame-support/std",
	"frame-system/std",
	"log/std",
	"module-oracle/std",
	"module-support/std",
	"module-traits/std",
	"module-transaction-payment/std",
	"num_enum/std",
	"pallet-collective/std",
	"pallet-evm/std",
	"pallet-evm-precompile-simple/std",
	"pallet-membership/std",
	"pallet-scheduler/std",
	"primitives/std",
	"serde/std",
	"sp-core/std",
	"sp-runtime/std",
	"sp-std/std",
]
with-ethereum-compatibility = []

