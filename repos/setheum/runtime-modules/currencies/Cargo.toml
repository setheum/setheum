[package]
license = "Apache-2.0 OR MIT"
name = "module-currencies"
version = "0.9.81-dev"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
parity-scale-codec = { workspace = true, default-features = false }
scale-info = { workspace = true, default-features = false }
sp-core = { workspace = true, default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-io = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }

frame-support = { workspace = true, default-features = false }
frame-system = { workspace = true, default-features = false }

module-traits = { workspace = true , default-features = false }

primitives = { workspace = true , default-features = false }
module-support = { workspace = true , default-features = false }

[dev-dependencies]
serde_json = { workspace = true, features = ["std"] , default-features = false }
hex = { workspace = true, features = ["std"] , default-features = false }
hex-literal = { workspace = true , default-features = false }
sp-core = { workspace = true, features = ["std"] }
pallet-balances = { workspace = true, features = ["std"] }
pallet-timestamp = { workspace = true, features = ["std"] }
module-tokens = { workspace = true, features = ["std"] , default-features = false }
# module-evm = { workspace = true, features = ["std"] , default-features = false }
# module-evm-bridge = { workspace = true, features = ["std"] , default-features = false }

[features]
default = ["std"]
std = [
	"parity-scale-codec/std",
	"frame-support/std",
	"frame-system/std",
	"module-traits/std",
	"primitives/std",
	"scale-info/std",
	"sp-core/std",
	"sp-io/std",
	"sp-runtime/std",
	"sp-std/std",
	"module-support/std",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
]
