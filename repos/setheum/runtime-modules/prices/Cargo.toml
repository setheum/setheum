[package]
license = "Apache-2.0 OR MIT"
name = "module-prices"
version = "0.9.81-dev"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
parity-scale-codec = { workspace = true }
scale-info = { workspace = true }
sp-runtime = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
sp-core = { workspace = true }
sp-std = { workspace = true }
module-traits = { workspace = true , default-features = false }
module-support = { workspace = true , default-features = false }
primitives = { workspace = true , default-features = false }

[dev-dependencies]
sp-io = { workspace = true, features = ["std"] }
module-tokens = { workspace = true, features = ["std"] , default-features = false }

[features]
default = ["std"]
std = [
	"parity-scale-codec/std",
	"frame-support/std",
	"frame-system/std",
	"module-traits/std",
	"primitives/std",
	"scale-info/std",
	"sp-core/std",
	"sp-runtime/std",
	"sp-std/std",
	"module-support/std",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
]
