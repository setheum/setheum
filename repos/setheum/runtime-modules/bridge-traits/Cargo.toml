[package]
name = "module-bridge-traits"
version = "0.2.0"
edition = "2021"
license = "LGPL-3.0"

[features]
default = [ "std",]
std = [ "codec/std", "scale-info/std", "xcm/std", "xcm-builder/std", "sp-std/std", "ethabi/std", "primitive-types/std",]

[dependencies.codec]
workspace = true
features = [ "derive", "max-encoded-len",]
default-features = false

[dependencies.scale-info]
workspace = true
features = [ "derive", "serde", "decode",]
default-features = false

[dependencies.frame-support]
workspace = true
default-features = false

[dependencies.sp-std]
workspace = true
default-features = false

[dependencies.ethabi]
workspace = true
default-features = false

[dependencies.primitive-types]
version = "0.12"
default-features = false
features = [ "scale-info", "serde_no_std",]

[dependencies.xcm]
workspace = true
default-features = false

[dependencies.xcm-builder]
workspace = true
default-features = false
