[package]
name = "module-unknown-tokens"
description = "Unknown tokens module that implements `UnknownAsset` trait."
repository = "https://github.com/open-web3-stack/open-runtime-module-library/tree/master/unknown-tokens"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
version = "1.5.0"
authors = ["Acala Developers"]
edition = "2021"

[dependencies]
parity-scale-codec = { workspace = true }
scale-info = { workspace = true }
serde = { workspace = true, optional = true }

frame-support = { workspace = true }
frame-system = { workspace = true }
sp-std = { workspace = true }

xcm = { workspace = true }

module-xcm-support = { package = "module-xcm-support", path = "../xcm-support", version = "1.5.0", default-features = false }

[dev-dependencies]
sp-core = { workspace = true, features = ["std"] }
sp-io = { workspace = true, features = ["std"] }
sp-runtime = { workspace = true, features = ["std"] }
hex-literal = { workspace = true }

[features]
default = [ "std" ]
std = [
	"frame-support/std",
	"frame-system/std",
	"module-xcm-support/std",
	"parity-scale-codec/std",
	"scale-info/std",
	"serde",
	"sp-std/std",
	"xcm/std",
]
try-runtime = [ "frame-support/try-runtime", "frame-system/try-runtime" ]
