[package]
license = "Apache-2.0 OR MIT"
name = "module-idle-scheduler"
version = "1.0.0"
authors = [ "Afsall Labs", "Afsall Labs", "Setheum Foundation" ]
edition = "2018"

[dependencies]
serde = { workspace = true, optional = true }
scale-info = { workspace = true, features = ["derive"] }
codec = { package = "parity-scale-codec", version = "3.6.5", default-features = false }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }

setheum-primitives = { path = "../../primitives", default-features = false }
module-support = { workspace = true }

[dev-dependencies]
sp-core = { workspace = true }
sp-io = { workspace = true }

[features]
default = ["std"]
std = [
	"serde",
	"codec/std",
	"sp-runtime/std",
	"sp-std/std",
	"frame-support/std",
	"frame-system/std",
	"setheum-primitives/std",
	"module-support/std",
]
try-runtime = ["frame-support/try-runtime"]
