[package]
license = "Apache-2.0 OR MIT"
name = "module-idle-scheduler"
version = "1.0.0"
authors = [ "Afsall Labs", "Afsall Labs", "Setheum Foundation",]
edition = "2018"

[features]
default = [ "std",]
std = [ "serde", "codec/std", "sp-runtime/std", "sp-std/std", "frame-support/std", "frame-system/std", "setheum-primitives/std", "module-support/std",]
try-runtime = [ "frame-support/try-runtime",]

[dependencies.serde]
workspace = true
optional = true
default-features = false

[dependencies.scale-info]
workspace = true
features = [ "derive",]

[dependencies.codec]
workspace = true
default-features = false

[dependencies.sp-runtime]
workspace = true

[dependencies.sp-std]
workspace = true

[dependencies.frame-support]
workspace = true

[dependencies.frame-system]
workspace = true

[dependencies.setheum-primitives]
workspace = true
default-features = false

[dependencies.module-support]
workspace = true
default-features = false

[dev-dependencies.sp-core]
workspace = true

[dev-dependencies.sp-io]
workspace = true
