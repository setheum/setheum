[package]
license = "Apache-2.0 OR MIT"
name = "module-asset-registry"
version = "0.9.81-dev"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
log = { workspace = true , default-features = false }
scale-info = { workspace = true }
parity-scale-codec = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
primitives = { workspace = true , default-features = false }

xcm = { workspace = true , default-features = false }

module-support = { workspace = true , default-features = false }
module-traits = { workspace = true , default-features = false }

[dev-dependencies]
serde_json = { workspace = true, features = ["std"] , default-features = false }
hex = { workspace = true, features = ["std"] , default-features = false }
sp-core = { workspace = true, features = ["std"] }
sp-io = { workspace = true, features = ["std"] }
pallet-balances = { workspace = true, features = ["std"] }
pallet-timestamp = { workspace = true, features = ["std"] }

module-evm = { workspace = true, features = ["std"] , default-features = false }
module-evm-bridge = { workspace = true, features = ["std"] , default-features = false }

[features]
default = ["std"]
std = [
	"log/std",
	"parity-scale-codec/std",
	"scale-info/std",
	"sp-runtime/std",
	"sp-std/std",
	"frame-support/std",
	"frame-system/std",
	"primitives/std",
	"xcm/std",
	"module-support/std",
	"module-traits/std",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
]
