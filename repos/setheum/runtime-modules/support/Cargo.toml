[package]
license = "Apache-2.0 OR MIT"
name = "module-support"
version = "0.9.81-dev"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
impl-trait-for-tuples = { workspace = true , default-features = false }
parity-scale-codec = { workspace = true }
scale-info = { workspace = true }
serde = { workspace = true, optional = true, features = ["derive"] , default-features = false }

frame-support = { workspace = true }
frame-system = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
sp-core = { workspace = true }
sp-io = { workspace = true }
xcm = { workspace = true , default-features = false }

module-tokens = { workspace = true , default-features = false }
primitives = { workspace = true , default-features = false }

[dev-dependencies]
serde_json = { workspace = true, features = ["std"] , default-features = false }

[features]
default = ["std"]
std = [
	"parity-scale-codec/std",
	"frame-support/std",
	"frame-system/std",
	"module-tokens/std",
	"primitives/std",
	"scale-info/std",
	"serde",
	"sp-core/std",
	"sp-io/std",
	"sp-runtime/std",
	"sp-std/std",
	"xcm/std",
]
