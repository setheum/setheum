[package]
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
name = "module-committee-management"
version = "0.3.0"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
parity-scale-codec = { workspace = true, features = ["derive"] }
rand = { workspace = true , default-features = false }
rand_pcg = { workspace = true , default-features = false }
scale-info = { workspace = true, features = ["derive"] }
log = { workspace = true , default-features = false }

frame-support = { workspace = true }
frame-system = { workspace = true }
pallet-authorship = { workspace = true }
pallet-balances = { workspace = true }
pallet-session = { workspace = true }
pallet-staking = { workspace = true }
pallet-timestamp = { workspace = true }
sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-staking = { workspace = true }
sp-std = { workspace = true }

module-setbft = { workspace = true , default-features = false }
module-elections = { workspace = true , default-features = false }
primitives = { workspace = true , default-features = false }

[features]
default = ["std"]
std = [
    "parity-scale-codec/std",
    "rand/std",
    "scale-info/std",
    "log/std",

    "frame-support/std",
    "frame-system/std",
    "pallet-authorship/std",
    "pallet-balances/std",
    "pallet-session/std",
    "pallet-staking/std",
    "pallet-timestamp/std",
    "sp-core/std",
    "sp-io/std",
    "sp-runtime/std",
    "sp-staking/std",
    "sp-std/std",
    "primitives/std",
    "module-setbft/std",
    "module-elections/std",
]

try-runtime = [
    "frame-support/try-runtime",
]
