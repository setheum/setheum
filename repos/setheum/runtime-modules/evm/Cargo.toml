[package]
license = "Apache-2.0 OR MIT"
name = "module-evm"
version = "0.9.81-dev"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[[bench]]
name = "module_benches"
harness = false
required-features = ["wasm-bench"]

[dependencies]
log = { workspace = true , default-features = false }
parity-scale-codec = { workspace = true }
hex-literal = { workspace = true , default-features = false }
ripemd = { workspace = true , default-features = false }
rlp = { workspace = true , default-features = false }
serde = { workspace = true, features = ["alloc", "derive"] , default-features = false }
sha3 = { workspace = true , default-features = false }
tiny-keccak = { workspace = true, features = ["fips202"] , default-features = false }
scale-info = { workspace = true }
serde_json = { workspace = true, optional = true, features = ["alloc"] , default-features = false }
hex = { workspace = true, optional = true, features = ["alloc"] , default-features = false }
num = { workspace = true, features = ["alloc"] , default-features = false }
bn = { workspace = true , default-features = false }

frame-support = { workspace = true }
frame-system = { workspace = true }
pallet-timestamp = { workspace = true }
pallet-balances = { workspace = true, optional = true }

sp-core = { workspace = true }
sp-io = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
module-traits = { workspace = true , default-features = false }
# wasm-bencher = { workspace = true, optional = true , default-features = false }
module-currencies = { workspace = true, optional = true , default-features = false }
module-tokens = { workspace = true, optional = true , default-features = false }

module-support = { workspace = true , default-features = false }
module-evm-utility = { workspace = true , default-features = false }
primitives = { workspace = true , default-features = false }
module-idle-scheduler = { workspace = true, optional = true , default-features = false }
module-transaction-payment = { workspace = true , default-features = false }
module-edfis_swap_legacy = { workspace = true, optional = true , default-features = false }

xcm-builder = { workspace = true , default-features = false }

# we don't directly depends on this but need frame-benchmarking/std to fix build
frame-benchmarking = { workspace = true, optional = true }

[dev-dependencies]
hex = { workspace = true, features = ["std"] , default-features = false }
env_logger = { workspace = true , default-features = false }
serde_json = { workspace = true, features = ["std"] , default-features = false }
pallet-utility = { workspace = true, features = ["std"] }

[features]
default = ["std"]
std = [
	"serde/std",

	"parity-scale-codec/std",
	"frame-support/std",
	"frame-system/std",
	"module-edfis_swap_legacy/std",
	"module-evm-utility/std",
	"module-idle-scheduler/std",
	"module-support/std",
	"module-transaction-payment/std",
	"num/std",
	# "wasm-bencher/std",
	"module-currencies/std",
	"module-tokens/std",
	"module-traits/std",
	"pallet-balances/std",
	"pallet-timestamp/std",
	"primitives/std",
	"ripemd/std",
	"rlp/std",
	"scale-info/std",
	"sha3/std",
	"sp-core/std",
	"sp-io/std",
	"sp-runtime/std",
	"sp-std/std",
	"xcm-builder/std",
	"frame-benchmarking/std",
]
with-ethereum-compatibility = []
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"module-edfis_swap_legacy/try-runtime",
	"module-idle-scheduler/try-runtime",
	"module-transaction-payment/try-runtime",
	"module-currencies/try-runtime",
	"module-tokens/try-runtime",
	"pallet-balances/try-runtime",
	"pallet-timestamp/try-runtime",
]
tracing = ["module-evm-utility/tracing"]
wasm-bench = [
	# "wasm-bencher/wasm-bench",
	"hex",
	"module-edfis_swap_legacy",
	"module-idle-scheduler",
	"module-currencies",
	"module-tokens",
	"pallet-balances",
	"serde_json",
	"sp-runtime/runtime-benchmarks",
	"xcm-builder/runtime-benchmarks",
]
evm-tests = [
	"primitives/evm-tests"
]
