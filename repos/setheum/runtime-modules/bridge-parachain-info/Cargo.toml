[package]
authors = [ "Parity Technologies <admin@parity.io>",]
edition = "2021"
name = "module-bridge-parachain-info"
version = "0.1.0"
license = "LGPL-3.0"

[features]
default = [ "std",]
std = [ "codec/std", "scale-info/std", "cumulus-primitives-core/std", "frame-support/std", "frame-system/std", "sp-runtime/std",]
try-runtime = [ "frame-support/try-runtime",]

[dependencies.codec]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.scale-info]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.frame-support]
workspace = true
default-features = false

[dependencies.frame-system]
workspace = true
default-features = false

[dependencies.sp-runtime]
workspace = true
default-features = false

[dependencies.cumulus-primitives-core]
workspace = true
default-features = false
