[package]
license = "Apache-2.0 OR MIT"
name = "module-tokens"
version = "0.9.81-dev"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
parity-scale-codec = { workspace = true, features = ["max-encoded-len"] }
log = { workspace = true , default-features = false }
scale-info = { workspace = true }
serde = { workspace = true, optional = true , default-features = false }

frame-benchmarking = { workspace = true, optional = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
sp-arithmetic = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }

module-traits = { workspace = true , default-features = false }

[dev-dependencies]
pallet-elections-phragmen = { workspace = true, features = ["std"] }
pallet-treasury = { workspace = true, default-features = false }
sp-core = { workspace = true, features = ["std"] }
sp-io = { workspace = true, features = ["std"] }
sp-staking = { workspace = true, features = ["std"] }

[features]
default = [ "std" ]
std = [
	"frame-benchmarking?/std",
	"frame-support/std",
	"frame-system/std",
	"log/std",
	"module-traits/std",
	"parity-scale-codec/std",
	"scale-info/std",
	"serde",
	"sp-arithmetic/std",
	"sp-runtime/std",
	"sp-std/std",
]
runtime-benchmarks = [
	"frame-benchmarking/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"sp-runtime/runtime-benchmarks",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"sp-runtime/try-runtime",
]
