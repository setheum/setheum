[package]
name = "module-bridge-xcm"
version = "0.3.0"
edition = "2021"
license = "LGPL-3.0"

[features]
default = [ "std",]
std = [ "codec/std", "scale-info/std", "frame-support/std", "frame-system/std", "sp-runtime/std", "sp-std/std", "sp-core/full_crypto", "xcm/std", "xcm-builder/std", "xcm-executor/std", "pallet-balances/std", "pallet-assets/std", "cumulus-primitives-core/std", "cumulus-primitives-utility/std", "cumulus-pallet-xcm/std", "module-bridge-traits/std", "module-bridge-forwarder/std",]
runtime-benchmarks = [ "frame-support/runtime-benchmarks", "frame-system/runtime-benchmarks",]
try-runtime = [ "frame-support/try-runtime",]

[dependencies.codec]
workspace = true
features = [ "derive", "max-encoded-len",]
default-features = false

[dependencies.scale-info]
workspace = true
features = [ "derive", "serde", "decode",]
default-features = false

[dependencies.frame-support]
workspace = true
default-features = false

[dependencies.frame-system]
