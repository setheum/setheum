[package]
license = "Apache-2.0 OR MIT"
name = "module-nft"
version = "0.9.81-dev"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
serde = { workspace = true, features = ["alloc", "derive"] , default-features = false }
parity-scale-codec = { workspace = true, features = ["max-encoded-len"], default-features = false }
scale-info = { workspace = true, default-features = false }

frame-benchmarking = { workspace = true, optional = true, default-features = false }
frame-support = { workspace = true, default-features = false }
frame-system = { workspace = true, default-features = false }
pallet-proxy = { workspace = true, default-features = false }
primitives = { workspace = true , default-features = false }
sp-runtime = { workspace = true, default-features = false }
sp-std = { workspace = true, default-features = false }

module-traits = { workspace = true , default-features = false }

[dev-dependencies]
sp-core = { workspace = true, features = ["std"] }
sp-io = { workspace = true, features = ["std"] }
pallet-balances = { workspace = true, features = ["std"] }
pallet-utility = { workspace = true, features = ["std"] }
module-tokens = { workspace = true, features = ["std"] , default-features = false }
# module-currencies = { workspace = true, features = ["std"] , default-features = false }
module-support = { workspace = true, features = ["std"] , default-features = false }

[features]
default = ["std"]
std = [
	"serde/std",

	"parity-scale-codec/std",
	"frame-benchmarking/std",
	"frame-support/std",
	"frame-system/std",
	"module-traits/std",
	"pallet-proxy/std",
	"primitives/std",
	"scale-info/std",
	"sp-runtime/std",
	"sp-std/std",
]
runtime-benchmarks = [
	"frame-benchmarking/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"pallet-proxy/runtime-benchmarks",
	"sp-runtime/runtime-benchmarks",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"pallet-proxy/try-runtime",
]
