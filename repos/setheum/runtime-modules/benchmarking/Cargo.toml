[package]
license = "Apache-2.0 OR MIT"
name = "module-benchmarking"
version = "0.9.81-dev"

[dev-dependencies]

[features]
default = [ "std",]
std = [ "frame-benchmarking/std", "frame-support/std", "frame-system/std", "log/std", "module-traits/std", "parity-scale-codec/std", "scale-info/std", "serde/std", "sp-core/std", "sp-io/std", "sp-runtime/std", "sp-std/std", "sp-storage/std",]
runtime-benchmarks = [ "frame-benchmarking/runtime-benchmarks", "frame-support/runtime-benchmarks", "frame-system/runtime-benchmarks", "sp-runtime/runtime-benchmarks",]
try-runtime = [ "frame-support/try-runtime", "frame-system/try-runtime", "sp-runtime/try-runtime",]

[package.authors]
workspace = true

[package.edition]
workspace = true

[package.homepage]
workspace = true

[package.repository]
workspace = true

[dependencies.parity-scale-codec]
workspace = true

[dependencies.scale-info]
workspace = true

[dependencies.serde]
workspace = true
optional = true
default-features = false

[dependencies.frame-benchmarking]
workspace = true

[dependencies.frame-support]
workspace = true

[dependencies.frame-system]
workspace = true

[dependencies.sp-runtime]
workspace = true

[dependencies.sp-std]
workspace = true

[dependencies.sp-core]
workspace = true

[dependencies.sp-io]
workspace = true

[dependencies.log]
workspace = true

[dependencies.paste]
workspace = true

[dependencies.module-traits]
workspace = true
default-features = false

[dependencies.sp-storage]
workspace = true
default-features = false
