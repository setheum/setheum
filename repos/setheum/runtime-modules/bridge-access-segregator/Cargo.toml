[package]
name = "module-bridge-access-segregator"
version = "0.2.0"
edition = "2021"
license = "LGPL-3.0"

[features]
default = [ "std",]
std = [ "codec/std", "scale-info/std", "frame-support/std", "frame-system/std", "frame-benchmarking/std", "sp-std/std",]
runtime-benchmarks = [ "frame-benchmarking", "frame-support/runtime-benchmarks", "frame-system/runtime-benchmarks",]
try-runtime = [ "frame-support/try-runtime",]

[dependencies.codec]
workspace = true
features = [ "derive", "max-encoded-len",]
default-features = false

[dependencies.scale-info]
workspace = true
features = [ "derive", "serde", "decode",]
default-features = false

[dependencies.frame-support]
workspace = true
default-features = false

[dependencies.frame-system]
workspace = true
default-features = false

[dependencies.frame-benchmarking]
workspace = true
default-features = false
optional = true

[dependencies.sp-std]
workspace = true
default-features = false

[dev-dependencies.sp-runtime]
workspace = true

[dev-dependencies.sp-io]
workspace = true

[dev-dependencies.frame-support]
workspace = true

[dev-dependencies.frame-system]
workspace = true

[dev-dependencies.pallet-balances]
workspace = true
