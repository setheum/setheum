[package]
name = "module-bridge"
version = "0.3.0"
edition = "2021"
license = "LGPL-3.0"

[dev-dependencies]
assert_matches = "1.4.0"

[features]
default = [ "std",]
runtime-benchmarks = [ "frame-benchmarking", "frame-support/runtime-benchmarks", "frame-system/runtime-benchmarks",]
std = [ "codec/std", "scale-info/std", "log/std", "ethabi/std", "hex/std", "bounded-collections/std", "primitive-types/std", "sp-runtime/std", "sp-io/std", "sp-std/std", "sp-core/full_crypto", "sp-arithmetic/std", "frame-support/std", "frame-system/std", "frame-benchmarking/std", "cumulus-primitives-core/std", "cumulus-primitives-utility/std", "cumulus-pallet-xcm/std", "xcm/std", "xcm-builder/std", "xcm-executor/std", "pallet-balances/std", "pallet-assets/std", "module-bridge-traits/std", "module-bridge-access-segregator/std", "module-bridge-basic-fee-handler/std", "module-bridge-percentage-fee-handler/std", "module-bridge-fee-handler-router/std", "module-bridge-forwarder/std", "module-bridge-xcm/std",]
try-runtime = [ "frame-support/try-runtime",]

[dependencies.codec]
workspace = true
features = [ "derive", "max-encoded-len",]
default-features = false

[dependencies.scale-info]
workspace = true
features = [ "derive", "serde", "decode",]
default-features = false

[dependencies.log]
workspace = true
default-features = false

[dependencies.ethabi]
workspace = true
default-features = false

[dependencies.primitive-types]
version = "0.12"
default-features = false
features = [ "scale-info", "serde_no_std",]

[dependencies.arrayref]
workspace = true
default-features = false

[dependencies.funty]
workspace = true
default-features = false

[dependencies.hex]
workspace = true
features = [ "alloc",]
default-features = false

[dependencies.fixed]
version = "1.23.0"
default-features = false

[dependencies.bounded-collections]
version = "0.1.4"
default-features = false

[dependencies.hex-literal]
workspace = true
default-features = false

[dependencies.sp-io]
workspace = true
default-features = false

[dependencies.sp-core]
workspace = true
default-features = false

[dependencies.sp-std]
workspace = true
default-features = false

[dependencies.sp-runtime]
workspace = true
default-features = false

[dependencies.frame-support]
workspace = true
default-features = false

[dependencies.frame-system]
workspace = true
default-features = false

[dependencies.frame-benchmarking]
workspace = true
default-features = false
optional = true

[dependencies.sp-arithmetic]
workspace = true
default-features = false

[dependencies.pallet-assets]
git = "https://github.com/paritytech/polkadot-sdk.git"
branch = "stable2506"
default-features = false

[dependencies.pallet-balances]
workspace = true
default-features = false

[dependencies.xcm]
workspace = true
default-features = false

[dependencies.xcm-builder]
workspace = true
default-features = false

[dependencies.xcm-executor]
workspace = true
default-features = false

[dependencies.cumulus-primitives-core]
workspace = true
default-features = false

[dependencies.cumulus-pallet-xcm]
workspace = true
default-features = false

[dependencies.cumulus-primitives-utility]
git = "https://github.com/paritytech/polkadot-sdk.git"
branch = "stable2506"
default-features = false

[dependencies.module-bridge-traits]
workspace = true
default-features = false

[dependencies.module-bridge-access-segregator]
workspace = true
default-features = false

[dependencies.module-bridge-basic-fee-handler]
workspace = true
default-features = false

[dependencies.module-bridge-percentage-fee-handler]
workspace = true
default-features = false

[dependencies.module-bridge-fee-handler-router]
workspace = true
default-features = false

[dependencies.module-bridge-forwarder]
workspace = true
default-features = false

[dependencies.module-bridge-xcm]
workspace = true
default-features = false

[dev-dependencies.hex-literal]
workspace = true

[dev-dependencies.sp-io]
workspace = true

[dev-dependencies.sp-core]
workspace = true

[dev-dependencies.sp-runtime]
workspace = true

[dev-dependencies.frame-support]
workspace = true

[dev-dependencies.frame-system]
workspace = true

[dev-dependencies.pallet-balances]
workspace = true

[dev-dependencies.pallet-assets]
git = "https://github.com/paritytech/polkadot-sdk.git"
branch = "stable2506"

[dev-dependencies.pallet-timestamp]
workspace = true

[dev-dependencies.xcm]
workspace = true

[dev-dependencies.xcm-builder]
workspace = true

[dev-dependencies.xcm-executor]
workspace = true

[dev-dependencies.polkadot-parachain-primitives]
workspace = true

