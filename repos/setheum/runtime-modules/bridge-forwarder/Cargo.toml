[package]
name = "module-bridge-forwarder"
version = "0.3.0"
edition = "2021"
license = "LGPL-3.0"

[features]
default = [ "std",]
std = [ "codec/std", "scale-info/std", "frame-support/std", "frame-system/std", "sp-std/std", "sp-io/std", "xcm/std", "xcm-builder/std", "xcm-executor/std", "cumulus-primitives-core/std", "cumulus-primitives-utility/std", "cumulus-pallet-xcm/std", "module-bridge-traits/std",]
runtime-benchmarks = [ "frame-support/runtime-benchmarks", "frame-system/runtime-benchmarks",]
try-runtime = [ "frame-support/try-runtime",]

[dependencies.codec]
workspace = true
features = [ "derive", "max-encoded-len",]
default-features = false

[dependencies.scale-info]
workspace = true
features = [ "derive", "serde", "decode",]
default-features = false

[dependencies.hex-literal]
workspace = true
default-features = false

[dependencies.frame-support]
workspace = true
default-features = false

[dependencies.frame-system]
workspace = true
default-features = false

[dependencies.sp-std]
workspace = true
default-features = false

[dependencies.sp-io]
workspace = true
default-features = false

[dependencies.pallet-balances]
workspace = true
default-features = false

[dependencies.pallet-assets]
git = "https://github.com/paritytech/polkadot-sdk.git"
branch = "stable2506"
default-features = false

[dependencies.xcm]
workspace = true
default-features = false

[dependencies.xcm-builder]
workspace = true
default-features = false

[dependencies.xcm-executor]
workspace = true
default-features = false

[dependencies.cumulus-primitives-core]
workspace = true
default-features = false

[dependencies.cumulus-pallet-xcm]
workspace = true
default-features = false

[dependencies.cumulus-primitives-utility]
git = "https://github.com/paritytech/polkadot-sdk.git"
branch = "stable2506"
default-features = false

[dependencies.module-bridge-traits]
workspace = true
default-features = false

[dev-dependencies.sp-runtime]
workspace = true

[dev-dependencies.sp-io]
workspace = true

[dev-dependencies.frame-support]
workspace = true

[dev-dependencies.frame-system]
workspace = true

[dev-dependencies.pallet-balances]
workspace = true

[dev-dependencies.pallet-assets]
git = "https://github.com/paritytech/polkadot-sdk.git"
branch = "stable2506"

[dev-dependencies.pallet-timestamp]
workspace = true

[dev-dependencies.polkadot-parachain-primitives]
workspace = true

[dev-dependencies.module-bridge-traits]
workspace = true
default-features = false

[dev-dependencies.module-bridge-parachain-info]
workspace = true
default-features = false
