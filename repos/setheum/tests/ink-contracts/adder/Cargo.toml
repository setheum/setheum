[package]
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
name = "adder"
version = "0.1.0"
authors = [ "[your_name] <[your_email]>",]
edition = "2021"

[lib]
name = "adder"
path = "lib.rs"

[features]
default = [ "std",]
std = [ "ink/std", "scale/std", "scale-info/std",]
ink-as-dependency = []

[dependencies.ink]
workspace = true
default-features = false

[dependencies.scale]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.scale-info]
workspace = true
optional = true
features = [ "derive",]
