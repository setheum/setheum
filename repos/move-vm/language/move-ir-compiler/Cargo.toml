[package]
name = "move-ir-compiler"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Move IR to bytecode compiler"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[features]
default = []

[dependencies.anyhow]
workspace = true

[dependencies.move-bytecode-verifier]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-ir-to-bytecode]
workspace = true

[dependencies.move-bytecode-source-map]
workspace = true

[dependencies.move-ir-types]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-symbol-pool]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.serde_json]
workspace = true

[dependencies.bcs]
workspace = true
