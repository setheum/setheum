[[bin]]
name = "code_unit"
path = "fuzz_targets/code_unit.rs"
test = false
doc = false

[[bin]]
name = "compiled_module"
path = "fuzz_targets/compiled_module.rs"
test = false
doc = false

[[bin]]
name = "mixed"
path = "fuzz_targets/mixed.rs"
test = false
doc = false

[package]
name = "bytecode-verifier-libfuzzer"
version = "0.0.0"
authors = [ "Diem Association <opensource@diem.com>",]
license = "Apache-2.0"
publish = false
edition = "2018"

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = "1.1.7"

[package.metadata]
cargo-fuzz = true

[dependencies.move-bytecode-verifier]
workspace = true

[dependencies.move-core-types]
workspace = true
features = [ "fuzzing",]

[dependencies.move-binary-format]
workspace = true
features = [ "fuzzing",]
