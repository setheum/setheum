[package]
name = "bytecode-verifier-tests"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Diem bytecode verifier tests"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[dev-dependencies]
petgraph = "0.5.1"
proptest = "1.0.0"

[features]
fuzzing = [ "move-binary-format/fuzzing",]
address32 = [ "move-core-types/address32",]

[dev-dependencies.fail]
version = "0.4.0"
features = [ "failpoints",]

[dev-dependencies.hex]
workspace = true

[dev-dependencies.move-bytecode-verifier]
workspace = true

[dev-dependencies.invalid-mutations]
workspace = true

[dev-dependencies.move-core-types]
workspace = true

[dev-dependencies.move-binary-format]
workspace = true
features = [ "fuzzing",]
