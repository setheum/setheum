[[bin]]
name = "instantiation"
path = "src/tests/instantiation_tests.rs"

[package]
name = "move-vm-integration-tests"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Move VM Integration Tests"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
tempfile = "3.2.0"
memory-stats = "1.0.0"

[features]
default = []
table-extension = [ "move-table-extension", "move-vm-test-utils/table-extension",]

[dependencies.anyhow]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-bytecode-verifier]
workspace = true

[dependencies.move-compiler]
workspace = true

[dependencies.move-vm-runtime]
workspace = true

[dependencies.move-vm-types]
workspace = true

[dependencies.move-vm-test-utils]
workspace = true

[dependencies.move-stdlib]
workspace = true

[dependencies.move-table-extension]
workspace = true
optional = true
