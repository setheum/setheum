[package]
name = "move-vm-runtime"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Core Move execution logic"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[features]
default = [ "std",]
fuzzing = [ "move-vm-types/fuzzing",]
failpoints = [ "fail/failpoints",]
debugging = [ "once_cell/std", "std",]
testing = []
stacktrace = []
lazy_natives = []
std = [ "sha3/std", "fail/failpoints", "move-bytecode-verifier/std", "move-core-types/std", "move-vm-types/std", "move-binary-format/std",]

[dependencies.fail]
version = "0.5"
default-features = false
optional = true

[dependencies.better_any]
git = "https://github.com/eigerco/better_any.git"
branch = "main"
default-features = false
features = [ "derive",]

[dependencies.sha3]
workspace = true
default-features = false

[dependencies.tracing]
workspace = true
default-features = false

[dependencies.hashbrown]
workspace = true
features = [ "ahash",]
default-features = false

[dependencies.once_cell]
version = "1.18"
default-features = false
optional = true

[dependencies.move-bytecode-verifier]
workspace = true
default-features = false

[dependencies.move-core-types]
workspace = true
default-features = false

[dependencies.move-vm-types]
workspace = true
default-features = false

[dependencies.move-binary-format]
workspace = true
default-features = false
