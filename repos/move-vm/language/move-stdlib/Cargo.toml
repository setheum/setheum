[package]
name = "move-stdlib"
version = "0.1.1"
edition = "2021"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Diem stdlib"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false

[dev-dependencies]
file_diff = "1.0"
tempfile = "3.8"
walkdir = "2.4"

[features]
default = [ "std", "address32",]
stdlib-bytecode = []
testing = []
address20 = [ "move-core-types/address20",]
address32 = [ "move-core-types/address32",]
std = [ "log/std", "move-errmapgen", "move-docgen", "move-command-line-common", "move-prover", "move-vm-types/std", "move-binary-format/std", "move-core-types/std", "move-vm-runtime/std", "move-compiler", "hex/std",]

[dependencies.blake2-rfc]
version = "0.2"
default-features = false

[dependencies.hex]
workspace = true
default-features = false

[dependencies.log]
workspace = true
optional = true

[dependencies.move-binary-format]
workspace = true
default-features = false

[dependencies.move-command-line-common]
workspace = true
optional = true

[dependencies.move-compiler]
workspace = true
optional = true

[dependencies.move-core-types]
workspace = true
default-features = false

[dependencies.move-docgen]
workspace = true
optional = true

[dependencies.move-errmapgen]
workspace = true
optional = true

[dependencies.move-prover]
workspace = true
optional = true

[dependencies.move-vm-runtime]
workspace = true
default-features = false

[dependencies.move-vm-types]
workspace = true
default-features = false

[dependencies.ripemd]
workspace = true
default-features = false

[dependencies.sha2]
workspace = true
default-features = false

[dependencies.sha3]
workspace = true
default-features = false

[dependencies.siphasher]
version = "1"
default-features = false

[dependencies.smallvec]
workspace = true
default-features = false

[dependencies.tiny-keccak]
workspace = true
features = [ "keccak",]
default-features = false

[dev-dependencies.anyhow]
workspace = true

[dev-dependencies.move-cli]
workspace = true

[dev-dependencies.move-package]
workspace = true

[dev-dependencies.move-unit-test]
workspace = true
