[[test]]
name = "tests"
harness = false

[package]
name = "move-transactional-test-runner"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Transactional testing framework for Move"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
colored = "2.0.0"
once_cell = "1.7.2"
regex = "1.1.9"
rayon = "1.5.0"
tempfile = "3.2.0"

[dev-dependencies]
datatest-stable = "0.1.1"
difference = "2.0.0"

[features]
failpoints = [ "move-vm-runtime/failpoints",]

[dependencies.anyhow]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.move-stackless-bytecode-interpreter]
workspace = true

[dependencies.move-bytecode-verifier]
workspace = true

[dependencies.move-bytecode-source-map]
workspace = true

[dependencies.move-disassembler]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-bytecode-utils]
workspace = true

[dependencies.move-cli]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-ir-compiler]
workspace = true

[dependencies.move-ir-types]
workspace = true

[dependencies.move-compiler]
workspace = true

[dependencies.move-stdlib]
workspace = true
features = [ "testing",]

[dependencies.move-symbol-pool]
workspace = true

[dependencies.move-vm-test-utils]
workspace = true

[dependencies.move-vm-types]
workspace = true

[dependencies.move-vm-runtime]
workspace = true

[dependencies.move-resource-viewer]
workspace = true
