[package]
name = "test-generation"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Tool for generating tests for the bytecode verifier and Move VM runtime"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
num_cpus = "1.13.0"
getrandom = "0.2.2"
crossbeam-channel = "0.5.0"
once_cell = "1.7.2"

[dependencies.rand]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.itertools]
workspace = true

[dependencies.hex]
workspace = true

[dependencies.tracing]
workspace = true

[dependencies.tracing-subscriber]
workspace = true
features = [ "env-filter",]

[dependencies.move-bytecode-verifier]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-vm-runtime]
workspace = true

[dependencies.move-vm-test-utils]
workspace = true

[dependencies.move-vm-types]
workspace = true

[dependencies.module-generation]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-stdlib]
workspace = true

[dependencies.move-compiler]
workspace = true
