[[test]]
name = "move_check_testsuite"
harness = false

[package]
name = "move-compiler"
version = "0.0.1"
authors = [ "Diem Association <opensource@diem.com>",]
description = "The definition of the Move source language, and its compiler"
publish = false
edition = "2021"
license = "Apache-2.0"

[dependencies]
codespan-reporting = "0.11.1"
regex = "1.5.5"
difference = "2.0.0"
petgraph = "0.5.1"
walkdir = "2.3.1"
tempfile = "3.2.0"
once_cell = "1.7.2"
num-bigint = "0.4.0"

[dev-dependencies]
datatest-stable = "0.1.1"

[features]
address20 = [ "move-core-types/address20",]
address32 = [ "move-core-types/address32",]

[dependencies.anyhow]
workspace = true

[dependencies.hex]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.sha3]
workspace = true

[dependencies.bcs]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-bytecode-verifier]
workspace = true

[dependencies.move-symbol-pool]
workspace = true

[dependencies.move-ir-types]
workspace = true

[dependencies.move-ir-to-bytecode]
workspace = true

[dependencies.move-borrow-graph]
workspace = true

[dependencies.move-bytecode-source-map]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-vm-support]
workspace = true

[dev-dependencies.move-stdlib]
workspace = true
features = [ "stdlib-bytecode",]
