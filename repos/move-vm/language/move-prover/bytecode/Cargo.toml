[[test]]
name = "testsuite"
harness = false

[package]
name = "move-stackless-bytecode"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Move stackless bytecode"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
codespan = "0.11.1"
ethnum = "1.0.4"
im = "15.0.0"
once_cell = "1.7.2"
petgraph = "0.5.1"

[dev-dependencies]
datatest-stable = "0.1.1"

[dependencies.move-model]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-bytecode-verifier]
workspace = true

[dependencies.move-borrow-graph]
workspace = true

[dependencies.move-ir-to-bytecode]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-read-write-set-types]
workspace = true

[dependencies.move-compiler]
workspace = true

[dependencies.codespan-reporting]
version = "0.11.1"
features = [ "serde", "serialization",]

[dependencies.num]
workspace = true

[dependencies.itertools]
workspace = true

[dependencies.log]
workspace = true

[dependencies.serde]
workspace = true
features = [ "derive",]

[dependencies.paste]
workspace = true

[dev-dependencies.move-stdlib]
workspace = true

[dev-dependencies.move-prover-test-utils]
workspace = true

[dev-dependencies.anyhow]
workspace = true
