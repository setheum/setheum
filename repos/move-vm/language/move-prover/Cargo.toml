[[test]]
name = "testsuite"
harness = false

[package]
name = "move-prover"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
publish = false
edition = "2021"
license = "Apache-2.0"

[dependencies]
atty = "0.2.14"
codespan = "0.11.1"
codespan-reporting = "0.11.1"
pretty = "0.10.0"
simplelog = "0.12.0"
once_cell = "1.7.2"
toml = "0.5.8"

[dev-dependencies]
datatest-stable = "0.1.1"
shell-words = "1.0.0"
walkdir = "2.3.1"
tempfile = "3.2.0"

[dependencies.move-prover-boogie-backend]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-compiler]
workspace = true

[dependencies.move-model]
workspace = true

[dependencies.move-docgen]
workspace = true

[dependencies.move-abigen]
workspace = true

[dependencies.move-errmapgen]
workspace = true

[dependencies.move-stackless-bytecode]
workspace = true

[dependencies.move-ir-types]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.futures]
workspace = true

[dependencies.hex]
workspace = true

[dependencies.itertools]
workspace = true

[dependencies.log]
workspace = true
features = [ "serde",]

[dependencies.num]
workspace = true

[dependencies.rand]
workspace = true

[dependencies.serde]
workspace = true
features = [ "derive",]

[dependencies.serde_json]
workspace = true

[dependencies.tokio]
workspace = true
features = [ "full",]

[dev-dependencies.move-stdlib]
workspace = true
features = [ "stdlib-bytecode",]

[dev-dependencies.move-prover-test-utils]
workspace = true
