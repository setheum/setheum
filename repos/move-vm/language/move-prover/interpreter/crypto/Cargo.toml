[package]
name = "bytecode-interpreter-crypto"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
publish = false
edition = "2021"
license = "Apache-2.0"

[features]
default = [ "fiat",]
fiat = [ "curve25519-dalek/fiat_u64_backend", "ed25519-dalek/fiat_u64_backend",]
u64 = [ "curve25519-dalek/u64_backend", "ed25519-dalek/u64_backend",]
u32 = [ "curve25519-dalek/u32_backend", "ed25519-dalek/u32_backend",]

[dependencies.anyhow]
workspace = true

[dependencies.curve25519-dalek]
version = "0.1.0"
package = "curve25519-dalek-fiat"
default-features = false
features = [ "std",]

[dependencies.ed25519-dalek]
version = "0.1.0"
package = "ed25519-dalek-fiat"
default-features = false
features = [ "std", "serde",]

[dependencies.sha2]
workspace = true

[dependencies.sha3]
workspace = true
