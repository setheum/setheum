[package]
name = "prover-lab"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
publish = false
edition = "2021"
license = "Apache-2.0"

[dependencies]
z3tracer = "0.8.0"
codespan-reporting = "0.11.1"
chrono = "0.4.19"
simplelog = "0.12.0"

[dependencies.move-compiler]
workspace = true

[dependencies.move-model]
workspace = true

[dependencies.move-prover]
workspace = true

[dependencies.move-stackless-bytecode]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.hex]
workspace = true

[dependencies.itertools]
workspace = true

[dependencies.log]
workspace = true
features = [ "serde",]

[dependencies.num]
workspace = true

[dependencies.plotters]
version = "0.3.0"
default_features = false
features = [ "evcxr", "line_series", "histogram",]

[dependencies.serde]
workspace = true
features = [ "derive",]

[dependencies.serde_json]
workspace = true
