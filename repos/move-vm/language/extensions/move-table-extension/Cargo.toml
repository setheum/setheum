[package]
name = "move-table-extension"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Wrapper for the Move VM which coordinates multiple extensions"
repository = "https://github.com/diem/move"
license = "Apache-2.0"
edition = "2021"
publish = false

[dependencies]
once_cell = "1.7.2"

[dev-dependencies]
tempfile = "3.2.0"

[dependencies.anyhow]
workspace = true

[dependencies.better_any]
git = "https://github.com/eigerco/better_any.git"
branch = "main"
features = [ "derive",]

[dependencies.smallvec]
workspace = true

[dependencies.sha3]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-vm-types]
workspace = true

[dependencies.move-vm-runtime]
workspace = true
features = [ "debugging",]

[dependencies.move-binary-format]
workspace = true

[dependencies.bcs]
workspace = true

[dev-dependencies.move-stdlib]
workspace = true
features = [ "testing",]

[dev-dependencies.move-unit-test]
workspace = true
features = [ "table-extension",]

[dev-dependencies.move-cli]
workspace = true

[dev-dependencies.move-package]
workspace = true
