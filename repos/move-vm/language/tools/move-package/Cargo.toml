[[test]]
name = "test_runner"
harness = false

[package]
name = "move-package"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Package and build system for Move code"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
toml = "0.5.8"
petgraph = "0.5.1"
walkdir = "2.3.1"
colored = "2.0.0"
serde_yaml = "0.8.17"
tempfile = "3.2.0"
regex = "1.1.9"
ptree = "0.4.0"
once_cell = "1.7.2"
named-lock = "0.2.0"
dirs-next = "2.0.0"

[dev-dependencies]
datatest-stable = "0.1.1"

[features]
evm-backend = [ "move-to-yul", "evm-exec-utils", "termcolor", "hex",]

[dependencies.serde]
workspace = true
features = [ "derive",]

[dependencies.anyhow]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.sha2]
workspace = true

[dependencies.itertools]
workspace = true

[dependencies.bcs]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-compiler]
workspace = true

[dependencies.move-bytecode-source-map]
workspace = true

[dependencies.move-abigen]
workspace = true

[dependencies.move-docgen]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-symbol-pool]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-model]
workspace = true

[dependencies.move-bytecode-utils]
workspace = true

[dependencies.move-to-yul]
workspace = true
optional = true

[dependencies.evm-exec-utils]
workspace = true
optional = true

[dependencies.termcolor]
version = "1.1.2"
optional = true

[dependencies.hex]
workspace = true
optional = true

[dependencies.reqwest]
version = "0.11.1"
features = [ "blocking", "json",]

[dependencies.whoami]
version = "1.2.1"

[dependencies.move-vm-support]
workspace = true
