[[bin]]
name = "move-unit-test"
path = "src/main.rs"

[[test]]
name = "move_unit_test_testsuite"
harness = false

[package]
name = "move-unit-test"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Unit testing framework for Move code"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
codespan-reporting = "0.11.1"
colored = "2.0.0"
rayon = "1.5.0"
regex = "1.5.5"
once_cell = "1.7.2"

[dev-dependencies]
datatest-stable = "0.1.1"
difference = "2.0.0"

[features]
evm-backend = [ "move-to-yul", "evm-exec-utils", "evm", "primitive-types",]
table-extension = [ "move-vm-test-utils/table-extension",]

[dependencies.anyhow]
workspace = true

[dependencies.better_any]
git = "https://github.com/eigerco/better_any.git"
branch = "main"
features = [ "derive",]

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.itertools]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-stdlib]
workspace = true
features = [ "testing",]

[dependencies.move-table-extension]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-compiler]
workspace = true

[dependencies.move-ir-types]
workspace = true

[dependencies.move-symbol-pool]
workspace = true

[dependencies.move-vm-types]
workspace = true

[dependencies.move-vm-runtime]
workspace = true
features = [ "testing",]

[dependencies.move-vm-test-utils]
workspace = true

[dependencies.move-resource-viewer]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-model]
workspace = true

[dependencies.move-stackless-bytecode-interpreter]
workspace = true

[dependencies.move-bytecode-utils]
workspace = true

[dependencies.move-to-yul]
workspace = true
optional = true

[dependencies.evm-exec-utils]
workspace = true
optional = true

[dependencies.evm]
version = "0.33.1"
optional = true

[dependencies.primitive-types]
version = "0.10.1"
optional = true
