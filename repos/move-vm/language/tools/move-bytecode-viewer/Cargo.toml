[package]
name = "move-bytecode-viewer"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Explore Move bytecode and how the source code compiles to it"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
regex = "1.5.5"
tui = "0.17.0"

[features]
default = []

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.anyhow]
workspace = true

[dependencies.crossterm]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-bytecode-source-map]
workspace = true

[dependencies.move-ir-types]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-disassembler]
workspace = true
