[[bin]]
name = "move"
path = "src/main.rs"

[[test]]
name = "sandbox_testsuite"
harness = false

[[test]]
name = "move_unit_tests_move_vm_and_stackless_vm"
harness = false

[[test]]
name = "move_unit_tests_evm"
harness = false
required-features = [ "evm-backend",]

[[test]]
name = "build_testsuite"
harness = false

[[test]]
name = "build_testsuite_evm"
harness = false
required-features = [ "evm-backend",]

[package]
name = "move-cli"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "CLI frontend for the Move compiler and VM"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
colored = "2.0.0"
difference = "2.0.0"
once_cell = "1.7.2"
serde_yaml = "0.8.17"
tempfile = "3.2.0"
walkdir = "2.3.1"
codespan-reporting = "0.11.1"

[dev-dependencies]
datatest-stable = "0.1.1"
httpmock = "0.6.6"

[features]
default = [ "address32",]
evm-backend = [ "move-unit-test/evm-backend", "move-package/evm-backend",]
address20 = [ "move-stdlib/address20",]
address32 = [ "move-stdlib/address32",]
table-extension = [ "move-table-extension", "move-unit-test/table-extension",]

[dependencies.anyhow]
workspace = true

[dependencies.serde]
workspace = true
default-features = false

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.itertools]
workspace = true

[dependencies.serde_json]
workspace = true

[dependencies.toml_edit]
version = "0.14.3"
features = [ "easy",]

[dependencies.reqwest]
version = "0.11.1"
features = [ "blocking", "json",]

[dependencies.bcs]
workspace = true

[dependencies.move-bytecode-verifier]
workspace = true

[dependencies.move-disassembler]
workspace = true

[dependencies.move-docgen]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-bytecode-utils]
workspace = true

[dependencies.move-coverage]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-ir-types]
workspace = true

[dependencies.move-compiler]
workspace = true

[dependencies.move-stdlib]
workspace = true
features = [ "testing",]

[dependencies.move-table-extension]
workspace = true
optional = true

[dependencies.move-symbol-pool]
workspace = true

[dependencies.move-vm-types]
workspace = true

[dependencies.move-vm-runtime]
workspace = true
features = [ "debugging",]

[dependencies.move-vm-test-utils]
workspace = true

[dependencies.read-write-set]
workspace = true

[dependencies.read-write-set-dynamic]
workspace = true

[dependencies.move-resource-viewer]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-package]
workspace = true

[dependencies.move-prover]
workspace = true

[dependencies.move-unit-test]
workspace = true

[dependencies.move-errmapgen]
workspace = true

[dependencies.move-bytecode-source-map]
workspace = true

[dependencies.move-bytecode-viewer]
workspace = true
