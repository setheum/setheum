[package]
name = "move-coverage"
version = "0.1.0"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Diem Move VM code coverage"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = false
edition = "2021"

[dependencies]
once_cell = "1.7.2"
petgraph = "0.5.1"
colored = "2.0.0"

[features]
default = []

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.serde]
workspace = true
default-features = false

[dependencies.anyhow]
workspace = true

[dependencies.codespan]
version = "0.11.1"
features = [ "serialization",]

[dependencies.bcs]
workspace = true

[dependencies.move-command-line-common]
workspace = true

[dependencies.move-core-types]
workspace = true

[dependencies.move-ir-types]
workspace = true

[dependencies.move-binary-format]
workspace = true

[dependencies.move-bytecode-source-map]
workspace = true
