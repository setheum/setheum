[package]
name = "move-core-types"
version = "0.0.4"
authors = [ "Diem Association <opensource@diem.com>",]
description = "Core types for Move"
repository = "https://github.com/diem/diem"
homepage = "https://diem.com"
license = "Apache-2.0"
publish = [ "crates-io",]
edition = "2021"

[dependencies]
ref-cast = "1.0"

[dev-dependencies]
proptest = "1.2"
proptest-derive = "0.4"
regex = "1.9"
once_cell = "1.18"

[features]
address20 = []
address32 = []
default = [ "std", "address32",]
fuzzing = [ "proptest", "proptest-derive", "arbitrary",]
std = [ "anyhow/std", "uint/std", "parity-scale-codec/std", "primitive-types/std", "bcs/std", "scale-info/std",]

[dependencies.anyhow]
workspace = true
default-features = false

[dependencies.hex]
workspace = true
features = [ "alloc",]
default-features = false

[dependencies.proptest]
version = "1.2"
default-features = false
optional = true

[dependencies.proptest-derive]
version = "0.4"
default-features = false
optional = true

[dependencies.rand]
workspace = true
default-features = false

[dependencies.scale-info]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.serde]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.serde_bytes]
version = "0.11"
default-features = false
features = [ "alloc",]

[dependencies.primitive-types]
version = "0.12"
default-features = false

[dependencies.uint]
version = "0.9"
default-features = false

[dependencies.num]
workspace = true
features = [ "alloc",]
default-features = false

[dependencies.ethnum]
version = "1.4"
default-features = false

[dependencies.hashbrown]
workspace = true
features = [ "ahash",]
default-features = false

[dependencies.bcs]
workspace = true
default-features = false

[dependencies.arbitrary]
version = "1.3"
default-features = false
features = [ "derive_arbitrary",]
optional = true

[dependencies.parity-scale-codec]
workspace = true
features = [ "derive",]
default-features = false

[dev-dependencies.arbitrary]
version = "1.3"
default-features = false
features = [ "derive_arbitrary",]

[dev-dependencies.serde_json]
workspace = true
