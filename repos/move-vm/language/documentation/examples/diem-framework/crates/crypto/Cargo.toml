[[bench]]
name = "noise"
harness = false

[[bench]]
name = "ed25519"
harness = false

[package]
name = "diem-crypto"
version = "0.0.3"
authors = [ "Diem Association <opensource@diem.com>",]
publish = false
edition = "2021"
license = "Apache-2.0"

[dependencies]
digest = "0.9.0"
hkdf = "0.10.0"
once_cell = "1.7.2"
mirai-annotations = "1.10.1"
serde_bytes = "0.11.5"
serde-name = "0.1.1"
aes-gcm = "0.8.0"

[dev-dependencies]
bitvec = "0.19.4"
byteorder = "1.4.3"
proptest = "1.0.0"
proptest-derive = "0.3.0"
ripemd160 = "0.9.1"
criterion = "0.3.4"

[features]
default = [ "fiat",]
assert-private-keys-not-cloneable = []
cloneable-private-keys = []
fuzzing = [ "proptest", "proptest-derive", "cloneable-private-keys",]
fiat = [ "curve25519-dalek/fiat_u64_backend", "ed25519-dalek/fiat_u64_backend", "x25519-dalek/fiat_u64_backend",]
u64 = [ "curve25519-dalek/u64_backend", "ed25519-dalek/u64_backend", "x25519-dalek/u64_backend",]
u32 = [ "curve25519-dalek/u32_backend", "ed25519-dalek/u32_backend", "x25519-dalek/u32_backend",]

[dependencies.anyhow]
workspace = true

[dependencies.bytes]
workspace = true

[dependencies.curve25519-dalek]
version = "0.1.0"
package = "curve25519-dalek-fiat"
default-features = false
features = [ "std",]

[dependencies.ed25519-dalek]
version = "0.1.0"
package = "ed25519-dalek-fiat"
default-features = false
features = [ "std", "serde",]

[dependencies.hex]
workspace = true

[dependencies.proptest]
version = "1.0.0"
optional = true

[dependencies.proptest-derive]
version = "0.3.0"
optional = true

[dependencies.rand]
workspace = true

[dependencies.rand_core]
version = "0.6.2"
default-features = false

[dependencies.serde]
workspace = true
features = [ "derive",]

[dependencies.sha2]
workspace = true

[dependencies.static_assertions]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.tiny-keccak]
workspace = true
features = [ "sha3",]

[dependencies.x25519-dalek]
version = "0.1.0"
package = "x25519-dalek-fiat"
default-features = false
features = [ "std",]

[dependencies.diem-crypto-derive]
workspace = true

[dependencies.bcs]
workspace = true

[dev-dependencies.sha3]
workspace = true

[dev-dependencies.serde_json]
workspace = true

[dev-dependencies.trybuild]
workspace = true
