[package]
name = "set-bft-examples-ordering"
version = "0.1.0"
edition = "2021"
authors = [ "Afsall Labs",]
license = "Apache-2.0 OR MIT"
publish = false

[dependencies.set-bft]
workspace = true

[dependencies.set-bft-mock]
workspace = true

[dependencies.set-bft-types]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.codec]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.env_logger]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.log]
workspace = true

[dependencies.parking_lot]
workspace = true

[dependencies.time]
version = "0.3"
features = [ "formatting", "macros", "local-offset",]

[dependencies.tokio]
workspace = true
features = [ "macros", "rt", "rt-multi-thread", "io-util", "net", "time", "fs",]

[dependencies.tokio-util]
version = "0.7.13"
features = [ "compat",]
