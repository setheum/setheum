[package]
name = "set-bft-examples-blockchain"
version = "0.0.3"
edition = "2021"
authors = [ "Afsall Labs",]
license = "Apache-2.0 OR MIT"
publish = false

[dependencies.set-bft]
workspace = true

[dependencies.set-bft-mock]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.clap]
workspace = true
features = [ "derive",]

[dependencies.codec]
workspace = true
features = [ "derive",]
default-features = false

[dependencies.env_logger]
workspace = true

[dependencies.futures]
workspace = true

[dependencies.futures-timer]
workspace = true

[dependencies.log]
workspace = true

[dependencies.parking_lot]
workspace = true

[dependencies.sha3]
workspace = true

[dependencies.time]
version = "0.3"
features = [ "formatting", "macros", "local-offset",]

[dependencies.tokio]
workspace = true
features = [ "macros", "rt", "rt-multi-thread", "io-util", "net", "time",]

[dependencies.unsigned-varint]
version = "0.8.0"
features = [ "futures", "asynchronous_codec",]
